<!--

Ce fichier joue le rôle d'arène pour les combats.
Il ne contient que le squelette de la page, sans données brutes.
Il appelle js/app.js qui se charge de communiquer avec l'API
afin de récupérer les données et remplir les blocs html correspondants

-->

<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="css/style.css">

    <title>Arène de combat</title>
</head>
<body>

<main class="game-container">
    <div id="selection-screen">
        <h1 class="title">Choisissez votre Pokémon</h1>
        <div class="character-list" id="character-list"></div>
    </div>

    <div id="battle-arena" style="display: none;">
        <h1>Arène de Combat</h1>

        <section id="battle-log" class="battle-log">
            <p>En attente du début du combat...</p>
        </section>

        <div class="arena">
            <div class="mob-card player-card">
                <h2 id="player-name">Chargement...</h2>
                <div class="hp-bar-container">
                    <div id="player-hp-bar" class="hp-bar" style="width: 100%;"></div>
                </div>
                <p>HP: <span id="player-hp">?</span> / <span id="player-max-hp">?</span></p>

                <div class="actions">
                    <button id="btn-attack" disabled>Lancer une attaque !</button>
                </div>
            </div>

            <div class="vs-separator">VS</div>

            <div class="mob-card opponent-card">
                <h2 id="opponent-name">Chargement...</h2>
                <div class="hp-bar-container">
                    <div id="opponent-hp-bar" class="hp-bar" style="width: 100%;"></div>
                </div>
                <p>HP: <span id="opponent-hp">?</span> / <span id="opponent-max-hp">?</span></p>
            </div>
        </div>

        <div class="global-controls">
            <button id="btn-reset">Recommencer la partie</button>
        </div>

    </div>

    <script src="./js/app.js"></script>
</main>


</body>
</html>
