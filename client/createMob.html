<!doctype html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Créer un pokemon</title>
</head>
<body>
    <form method="POST">
        <input type="text" name="name" id="input-name" placeholder="Nom du pokémon">
        <input type="number" name="hp" id="input-maxHp" placeholder="HP de base du Pokémon">
        <input type="number" name="atk" id="input-atk" placeholder="ATK du Pokémon">
        <button type="submit" id="btn-submit">Créer</button>
    </form>
<script src="./js/createMob.js"></script>
</body>
</html>
